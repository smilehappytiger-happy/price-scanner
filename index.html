<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値札レジゴー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    // ★ ここにGASのウェブアプリURLを貼り付けてください
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzyQpm2Nmb_qaozmFtYIYA-ZiYRlSatvSVotL2i41-Jog3gvxbQOZszb9Gi5YfO3P3NmQ/exec";

    let cart = [];
    let videoStream = null;
    let currentCropRatio = { w: 0.8, h: 0.4 }; // 初期枠：横長
    let originalScannedPrice = 0; // 割引計算用の元値保存

    // 枠の切り替え機能
    function changeFrame(type, clickedBtn) {
      const frameBox = document.getElementById('frame-box');
      
      document.querySelectorAll('.frame-btn').forEach(btn => {
        btn.classList.replace('bg-indigo-600', 'bg-gray-200');
        btn.classList.replace('text-white', 'text-gray-700');
      });
      clickedBtn.classList.replace('bg-gray-200', 'bg-indigo-600');
      clickedBtn.classList.replace('text-gray-700', 'text-white');

      if (type === 'landscape') {
        frameBox.className = "w-[80%] h-[40%] border-4 border-red-500 rounded-xl relative shadow-[0_0_0_999px_rgba(0,0,0,0.5)] flex flex-col items-center justify-center transition-all duration-300";
        currentCropRatio = { w: 0.8, h: 0.4 };
      } else if (type === 'square') {
        frameBox.className = "w-[60%] aspect-square border-4 border-red-500 rounded-xl relative shadow-[0_0_0_999px_rgba(0,0,0,0.5)] flex flex-col items-center justify-center transition-all duration-300";
        currentCropRatio = { w: 0.6, h: 0.6 };
      } else if (type === 'portrait') {
        frameBox.className = "w-[50%] h-[70%] border-4 border-red-500 rounded-xl relative shadow-[0_0_0_999px_rgba(0,0,0,0.5)] flex flex-col items-center justify-center transition-all duration-300";
        currentCropRatio = { w: 0.5, h: 0.7 };
      }
    }

    // カメラの起動
    async function startCamera() {
      const video = document.getElementById('camera');
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });
        video.srcObject = videoStream;
        document.getElementById('start-camera-btn').classList.add('hidden');
        document.getElementById('capture-btn').classList.remove('hidden');
        document.getElementById('guide-frame').classList.remove('hidden');
        document.getElementById('frame-controls').classList.remove('hidden');
      } catch (err) {
        alert("カメラの起動に失敗しました。ブラウザの権限を確認してください。");
      }
    }

    // 撮影とGASへの送信（トリミング処理付き）
    async function captureAndSend() {
      const video = document.getElementById('camera');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      const vWidth = video.videoWidth;
      const vHeight = video.videoHeight;
      const cropWidth = vWidth * currentCropRatio.w;
      const cropHeight = vHeight * currentCropRatio.h;
      const startX = (vWidth - cropWidth) / 2;
      const startY = (vHeight - cropHeight) / 2;

      canvas.width = cropWidth;
      canvas.height = cropHeight;
      ctx.drawImage(video, startX, startY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

      const imageSrc = canvas.toDataURL('image/jpeg', 0.8);
      const base64Data = imageSrc.split(',')[1];

      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('capture-btn').disabled = true;

      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ image: base64Data })
        });
        const result = await response.json();

        if (result.success) {
          showPreview(result.name, result.price, imageSrc);
        } else {
          alert("エラー: " + result.error);
        }
      } catch (error) {
        alert("通信エラーが発生しました。");
      } finally {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('capture-btn').disabled = false;
      }
    }

    // プレビュー画面の表示
    function showPreview(name, price, imageSrc) {
      document.getElementById('camera-area').classList.add('hidden');
      document.getElementById('preview-area').classList.remove('hidden');
      
      document.getElementById('preview-image').src = imageSrc;
      document.getElementById('preview-name').value = name; 
      document.getElementById('preview-price').value = price;
      
      originalScannedPrice = price; // 元値を保存
      getDiscountInput().value = ''; // 割引入力をリセット
    }

    // 割引アシスト機能群
    const getDiscountInput = () => document.getElementById('discount-percent-input');

    function resetDiscount() {
      document.getElementById('preview-price').value = originalScannedPrice;
      getDiscountInput().value = ''; 
    }

    function applyQuickDiscount(percent) {
        getDiscountInput().value = percent;
        applyCustomDiscount();
    }

    function applyCustomDiscount() {
        const ratePercent = parseInt(getDiscountInput().value) || 0;
        
        if (ratePercent <= 0 || ratePercent >= 100) {
            resetDiscount();
            return;
        }

        const rate = ratePercent / 100;
        let newPrice = Math.floor(originalScannedPrice * (1 - rate));
        document.getElementById('preview-price').value = newPrice;
    }

    // プレビューのキャンセル
    function cancelPreview() {
      document.getElementById('preview-area').classList.add('hidden');
      document.getElementById('camera-area').classList.remove('hidden');
    }

    // カートへ追加
    function addToCart() {
      const name = document.getElementById('preview-name').value || "不明な商品";
      const price = parseInt(document.getElementById('preview-price').value) || 0;
      const id = Date.now();

      cart.push({ id, name, price });
      updateCartUI();
      cancelPreview();
    }

    // カートから削除
    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      updateCartUI();
    }

    // 画面の更新（リストと合計金額）
    function updateCartUI() {
      const listEl = document.getElementById('cart-list');
      const totalEl = document.getElementById('total-price');
      const countEl = document.getElementById('item-count');

      listEl.innerHTML = '';
      let total = 0;

      cart.forEach(item => {
        total += item.price;
        listEl.innerHTML += `
          <li class="flex justify-between items-center p-2 hover:bg-gray-50 rounded border-b border-gray-100 last:border-0">
            <div class="truncate pr-4 flex-1">
              <p class="text-sm font-bold text-gray-800 truncate">${item.name}</p>
            </div>
            <div class="flex items-center gap-4">
              <p class="font-bold text-lg whitespace-nowrap">¥${item.price.toLocaleString()}</p>
              <button onclick="removeFromCart(${item.id})" class="text-red-400 hover:text-red-600 p-1">
                <i class="fa-solid fa-trash"></i>
              </button>
            </div>
          </li>
        `;
      });

      if (cart.length === 0) {
        listEl.innerHTML = '<p class="text-gray-400 text-center py-4 text-sm">まだ商品がありません</p>';
      }

      totalEl.innerText = `¥${total.toLocaleString()}`;
      countEl.innerText = `${cart.length} 点`;
    }
  </script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col pb-28">

  <header class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
    <h1 class="text-xl font-bold"><i class="fa-solid fa-cart-shopping mr-2"></i>値札レジゴー</h1>
    <div class="bg-indigo-800 px-3 py-1 rounded-full text-sm font-bold" id="item-count">0 点</div>
  </header>

  <main class="flex-1 p-4 max-w-md mx-auto w-full flex flex-col gap-4">
    
    <div id="camera-area">
      <div class="bg-white rounded-xl shadow-sm p-4 flex flex-col items-center border border-gray-200 relative">
        <h2 class="text-md font-bold mb-2 text-gray-700">枠を値札に合わせてください</h2>
        
        <div class="w-full relative rounded-lg overflow-hidden bg-black aspect-[4/3] flex items-center justify-center">
          <div id="loading" class="absolute inset-0 bg-black/60 z-20 flex flex-col items-center justify-center text-white hidden">
            <i class="fa-solid fa-spinner fa-spin fa-3x mb-2"></i>
            <p>AIが解析中...</p>
          </div>
          
          <video id="camera" autoplay playsinline class="w-full h-full object-cover"></video>
          
          <div id="guide-frame" class="absolute inset-0 z-10 flex items-center justify-center pointer-events-none hidden">
            <div id="frame-box" class="w-[80%] h-[40%] border-4 border-red-500 rounded-xl relative shadow-[0_0_0_999px_rgba(0,0,0,0.5)] flex flex-col items-center justify-center transition-all duration-300">
              <span class="text-white font-bold bg-red-500 px-3 py-1 rounded-full text-xs absolute -top-4">ここに合わせて撮影</span>
            </div>
          </div>
          <canvas id="canvas" class="hidden"></canvas>
        </div>

        <button id="start-camera-btn" onclick="startCamera()" class="mt-4 bg-gray-800 text-white px-6 py-3 rounded-full font-bold shadow">
          カメラを起動する
        </button>

        <button id="capture-btn" onclick="captureAndSend()" class="mt-4 bg-indigo-600 text-white p-4 rounded-full shadow-lg active:scale-95 transition-transform hidden">
          <i class="fa-solid fa-camera fa-2x"></i>
        </button>
      </div>

      <div id="frame-controls" class="mt-4 flex justify-center gap-3 hidden">
        <button onclick="changeFrame('landscape', this)" class="frame-btn px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold shadow transition-colors">横長</button>
        <button onclick="changeFrame('square', this)" class="frame-btn px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-bold shadow transition-colors">正方形</button>
        <button onclick="changeFrame('portrait', this)" class="frame-btn px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-bold shadow transition-colors">縦長</button>
      </div>
    </div>

    <div id="preview-area" class="bg-white rounded-xl shadow-md p-6 border border-indigo-200 flex flex-col items-center hidden">
      <h2 class="text-lg font-bold mb-4 text-indigo-700">この内容で追加しますか？</h2>
      <img id="preview-image" class="w-32 h-auto rounded shadow-sm mb-4 opacity-80" />
      
      <div class="w-full bg-gray-50 p-4 rounded-lg mb-4 border">
        <p class="text-sm text-gray-500 mb-1">商品名 (修正可能)</p>
        <input id="preview-name" type="text" class="w-full font-bold text-gray-800 mb-4 bg-transparent border-b border-gray-300 focus:outline-none focus:border-indigo-500" />
        
        <p class="text-sm text-gray-500 mb-1">価格 (円)</p>
        <input id="preview-price" type="number" class="w-full text-3xl font-bold text-right border-b-2 border-indigo-500 bg-transparent focus:outline-none text-indigo-700" />
        
        <div class="mt-4 pt-3 border-t border-gray-200">
          <div class="flex justify-between items-center mb-3">
            <p class="text-sm text-gray-500 font-bold"><i class="fa-solid fa-tag"></i> 割引アシスト</p>
            <button onclick="resetDiscount()" class="px-3 py-1.5 bg-gray-200 text-gray-700 rounded-lg text-xs font-bold shadow-sm active:bg-gray-300 transition-colors flex items-center gap-1">
              <i class="fa-solid fa-rotate-left"></i> 元値に戻す
            </button>
          </div>
          
          <div class="grid grid-cols-4 gap-2 mb-4">
            <button onclick="applyQuickDiscount(10)" class="py-3 bg-red-50 text-red-700 rounded-lg text-sm font-bold shadow-sm border border-red-200 active:bg-red-100 transition-colors">10%</button>
            <button onclick="applyQuickDiscount(20)" class="py-3 bg-red-50 text-red-700 rounded-lg text-sm font-bold shadow-sm border border-red-200 active:bg-red-100 transition-colors">20%</button>
            <button onclick="applyQuickDiscount(30)" class="py-3 bg-red-50 text-red-700 rounded-lg text-sm font-bold shadow-sm border border-red-200 active:bg-red-100 transition-colors">30%</button>
            <button onclick="applyQuickDiscount(40)" class="py-3 bg-red-50 text-red-700 rounded-lg text-sm font-bold shadow-sm border border-red-200 active:bg-red-100 transition-colors">40%</button>
            <button onclick="applyQuickDiscount(50)" class="py-3 bg-red-500 text-white rounded-lg text-sm font-bold shadow-sm active:bg-red-600 transition-colors">半額</button>
            <button onclick="applyQuickDiscount(60)" class="py-3 bg-red-50 text-red-700 rounded-lg text-sm font-bold shadow-sm border border-red-200 active:bg-red-100 transition-colors">60%</button>
            <button onclick="applyQuickDiscount(70)" class="py-3 bg-red-50 text-red-700 rounded-lg text-sm font-bold shadow-sm border border-red-200 active:bg-red-100 transition-colors">70%</button>
            <button onclick="applyQuickDiscount(80)" class="py-3 bg-red-50 text-red-700 rounded-lg text-sm font-bold shadow-sm border border-red-200 active:bg-red-100 transition-colors">80%</button>
          </div>

          <div class="flex items-center gap-2 pt-2 border-t border-gray-100">
            <label for="discount-percent-input" class="text-xs text-gray-500 flex-none font-bold">手動で％を指定する：</label>
            <div class="relative flex-1">
                <input id="discount-percent-input" type="number" min="0" max="99" step="1" placeholder="0" class="w-full text-right font-bold text-gray-800 pr-8 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500 text-sm bg-white" />
                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-gray-500 font-bold">%引</span>
            </div>
            <button onclick="applyCustomDiscount()" class="flex-none py-2 px-4 bg-gray-800 text-white rounded-lg text-sm font-bold shadow-sm active:bg-gray-950 transition-colors">適用</button>
          </div>
        </div>
      </div>

      <div class="flex gap-4 w-full">
        <button onclick="cancelPreview()" class="flex-1 py-3 bg-gray-200 text-gray-700 rounded-lg font-bold"><i class="fa-solid fa-xmark"></i> やめる</button>
        <button onclick="addToCart()" class="flex-1 py-3 bg-indigo-600 text-white rounded-lg font-bold"><i class="fa-solid fa-plus"></i> カートへ</button>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-200">
      <h2 class="font-bold text-gray-700 mb-3 border-b pb-2">買い物リスト</h2>
      <ul id="cart-list" class="flex flex-col gap-2">
        <p class="text-gray-400 text-center py-4 text-sm">まだ商品がありません</p>
      </ul>
    </div>
  </main>

  <div class="fixed bottom-0 w-full bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] p-4 pb-6">
    <div class="max-w-md mx-auto flex justify-between items-end">
      <div>
        <p class="text-sm text-gray-500 font-bold">合計金額</p>
        <p id="total-price" class="text-3xl font-black text-gray-900 leading-none mt-1">¥0</p>
      </div>
      <button onclick="alert('お買い上げありがとうございました！')" class="bg-gray-800 text-white px-8 py-3 rounded-xl font-bold shadow-md">精算する</button>
    </div>
  </div>

</body>
</html>
